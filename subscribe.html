<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل الاشتراك - نظام السوبر ماركت</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 60% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }
        
        .subscribe-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 35px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }
        
        .subscribe-card h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        /* حالة الاشتراك الحالية */
        .current-status {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        .current-status strong {
            color: #6ee7b7;
            font-size: 1rem;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 10px;
        }
        
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            text-align: right;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .input-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
            background: #3b4252;
        }
        
        .input-group input::placeholder {
            color: #64748b;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        
        .activate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .activate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }
        
        .activate-btn:active {
            transform: translateY(0);
        }
        
        .activate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .activate-btn.loading .btn-text {
            display: none;
        }
        
        .activate-btn.loading .loader {
            display: block;
        }
        
        .message {
            display: none;
            padding: 14px;
            border-radius: 12px;
            margin-top: 15px;
            font-weight: 600;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .message.success {
            display: block;
            background: rgba(16, 185, 129, 0.12);
            border: 1.5px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }
        
        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.12);
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        
        .back-link {
            display: block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            color: #f1f5f9;
        }
        
        .contact-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            font-size: 0.8rem;
            color: #64748b;
        }
        
        .contact-info a {
            color: #2563eb;
            text-decoration: none;
        }
        
        @media (max-width: 480px) {
            .subscribe-card {
                padding: 25px 18px;
            }
            
            .subscribe-card h1 {
                font-size: 1.3rem;
            }
            
            .input-group input {
                font-size: 1rem;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="subscribe-card">
            <!-- شعار -->
            <div class="logo-icon">🔐</div>
            
            <h1>تفعيل الاشتراك</h1>
            <p class="subtitle">أدخل كود التفعيل الخاص بك لإضافة أيام جديدة لاشتراكك</p>
            
            <!-- ✅ حالة الاشتراك الحالية -->
            <div class="current-status" id="currentSubscriptionInfo">
                جاري تحميل معلومات الاشتراك...
            </div>
            
            <!-- حقل كود التفعيل -->
            <div class="input-group">
                <label for="code">كود التفعيل</label>
                <input 
                    type="text" 
                    id="code" 
                    placeholder="XXXX-XXXX-XXXX-XXXX" 
                    maxlength="19" 
                    autocomplete="off"
                >
            </div>
            
            <!-- زر التفعيل -->
            <button id="activateBtn" class="activate-btn">
                <span class="btn-text">🚀 تفعيل الاشتراك</span>
                <div class="loader"></div>
            </button>
            
            <!-- رسالة النتيجة -->
            <div id="msg" class="message"></div>
            
            <!-- رابط العودة -->
            <a href="index.html" class="back-link">← العودة للنظام</a>
            
            <!-- معلومات الاتصال -->
            <div class="contact-info">
                <p>تحتاج مساعدة؟ تواصل مع الدعم الفني</p>
                <a href="https://wa.me/20101116626962" target="_blank">واتساب الدعم</a>
            </div>
        </div>
    </div>
    
    <script>
        const API = "https://abogad.vercel.app";
        const CLIENT = "abogad";
        
        // ==========================================
        // ✅ الحماية من جهة العميل
        // ==========================================
        (function() {
            document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) { e.preventDefault(); return false; }
                if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) { e.preventDefault(); return false; }
                if (e.ctrlKey && (e.key === 'S' || e.key === 's' || e.keyCode === 83)) { e.preventDefault(); return false; }
            });
            
            setInterval(function() {
                if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
                    console.clear();
                }
            }, 1000);
        })();
        
        // ==========================================
        // ✅ عرض معلومات الاشتراك الحالي (يدعم PRO و MAX)
        // ==========================================
        async function loadSubscriptionInfo() {
            const infoEl = document.getElementById('currentSubscriptionInfo');
            
            try {
                // فحص اشتراك PRO
                const proResponse = await fetch(`${API}/api/codes/check-subscription`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_name: CLIENT, site_type: 'PRO' })
                });

                // فحص اشتراك MAX
                const maxResponse = await fetch(`${API}/api/codes/check-subscription`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_name: CLIENT, site_type: 'MAX' })
                });

                let proDays = 0, maxDays = 0, proActive = false, maxActive = false;

                if (proResponse.ok) {
                    const data = await proResponse.json();
                    proActive = data.active;
                    proDays = data.remaining_days || 0;
                }

                if (maxResponse.ok) {
                    const data = await maxResponse.json();
                    maxActive = data.active;
                    maxDays = data.remaining_days || 0;
                }

                let html = '';
                
                // اشتراك PRO
                if (proActive && proDays > 0) {
                    html += `✅ <strong>PRO</strong>: متبقي ${proDays} يوم<br>`;
                } else {
                    html += `❌ <strong>PRO</strong>: غير مفعل<br>`;
                }

                // اشتراك MAX
                if (maxActive && maxDays > 0) {
                    html += `✅ <strong>MAX</strong>: متبقي ${maxDays} يوم`;
                } else {
                    html += `❌ <strong>MAX</strong>: غير مفعل`;
                }

                infoEl.innerHTML = html;

                if ((proActive && proDays > 0) || (maxActive && maxDays > 0)) {
                    infoEl.style.color = '#6ee7b7';
                } else {
                    infoEl.style.color = '#fca5a5';
                }

            } catch (error) {
                infoEl.innerHTML = `⚠️ تعذر الاتصال بالخادم`;
                infoEl.style.color = '#94a3b8';
            }
        }
        
        // ==========================================
        // ✅ تنسيق كود التفعيل تلقائياً
        // ==========================================
        const activationInput = document.getElementById('code');
        
        activationInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-zA-Z0-9]/g, '');
            value = value.substring(0, 16);
            
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formatted += '-';
                formatted += value[i].toUpperCase();
            }
            
            this.value = formatted;
        });
        
        // ==========================================
        // ✅ تفعيل الاشتراك (يدعم site_type)
        // ==========================================
        const activateBtn = document.getElementById('activateBtn');
        const messageBox = document.getElementById('msg');
        
        activateBtn.addEventListener('click', async function() {
            const code = activationInput.value.replace(/-/g, '');
            
            if (code.length < 16) {
                showMessage('⚠️ برجاء إدخال كود تفعيل صحيح (16 حرف)', 'error');
                activationInput.focus();
                return;
            }
            
            activateBtn.classList.add('loading');
            activateBtn.disabled = true;
            messageBox.style.display = 'none';
            
            try {
                const response = await fetch(`${API}/api/codes/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, client_name: CLIENT })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    const newDays = data.remaining_days || data.days_added || '---';
                    const siteType = data.site_type || '';
                    showMessage(`✅ تم تفعيل الكود بنجاح! ${siteType ? '(' + siteType + ') ' : ''}الاشتراك الآن ${newDays} يوم`, 'success');
                    activationInput.value = '';
                    
                    // تحديث معلومات الاشتراك الظاهرة
                    setTimeout(() => {
                        loadSubscriptionInfo();
                    }, 500);
                } else {
                    const errorMsg = data.message || '❌ كود التفعيل غير صحيح أو منتهي الصلاحية';
                    showMessage(errorMsg, 'error');
                }
            } catch (error) {
                showMessage('❌ فشل الاتصال بخادم التفعيل. حاول مرة أخرى.', 'error');
            } finally {
                activateBtn.classList.remove('loading');
                activateBtn.disabled = false;
            }
        });
        
        activationInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') activateBtn.click();
        });
        
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            messageBox.style.display = 'block';
        }
        
        // ==========================================
        // ✅ تحميل معلومات الاشتراك عند فتح الصفحة
        // ==========================================
        loadSubscriptionInfo();
    </script>
    
</body>
</html>
