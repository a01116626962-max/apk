<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل الاشتراك - نظام السوبر ماركت</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-main: 'Cairo', sans-serif;
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-input: #334155;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
            --transition: all 0.3s ease;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #0f172a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 60% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container { position: relative; z-index: 1; width: 100%; max-width: 450px; }
        
        .subscribe-card {
            background: var(--dark-card);
            border-radius: var(--radius-xl);
            padding: 35px 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }
        
        .subscribe-card h1 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        
        .subscribe-card .subtitle { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 25px; line-height: 1.5; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        
        .input-group label {
            display: block; font-size: 0.85rem; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 8px; text-align: right;
        }
        
        .input-group input {
            width: 100%; padding: 14px 16px;
            background: var(--dark-input);
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 1.1rem; font-family: var(--font-main);
            text-align: center; letter-spacing: 3px;
            transition: var(--transition); outline: none;
        }
        
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
            background: #3b4252;
        }
        
        .input-group input::placeholder { color: var(--text-muted); letter-spacing: 1px; font-size: 0.9rem; }
        
        .activate-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            color: white; border: none;
            border-radius: var(--radius);
            font-size: 1.1rem; font-weight: 700;
            cursor: pointer; font-family: var(--font-main);
            transition: var(--transition);
            position: relative; overflow: hidden;
        }
        
        .activate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); }
        .activate-btn:active { transform: translateY(0); }
        .activate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .loader {
            display: none; width: 24px; height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .activate-btn.loading .btn-text { display: none; }
        .activate-btn.loading .loader { display: block; }
        
        .message {
            display: none; padding: 14px; border-radius: var(--radius);
            margin-top: 15px; font-weight: 600; font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .message.success { display: block; background: rgba(16, 185, 129, 0.12); border: 1.5px solid rgba(16, 185, 129, 0.3); color: #6ee7b7; }
        .message.error { display: block; background: rgba(239, 68, 68, 0.12); border: 1.5px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        
        .back-link { display: block; margin-top: 20px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; transition: var(--transition); }
        .back-link:hover { color: var(--text-main); }
        
        .contact-info { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 0.8rem; color: var(--text-muted); }
        .contact-info a { color: var(--primary); text-decoration: none; }
        
        @media (max-width: 480px) {
            .subscribe-card { padding: 25px 18px; }
            .subscribe-card h1 { font-size: 1.3rem; }
            .input-group input { font-size: 1rem; padding: 12px 14px; }
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="subscribe-card">
            <div class="logo-icon">🔐</div>
            
            <h1>تفعيل الاشتراك</h1>
            <p class="subtitle">أدخل كود التفعيل الخاص بك للوصول إلى جميع ميزات النظام</p>
            
            <div class="input-group">
                <label for="activationCode">كود التفعيل</label>
                <input type="text" id="activationCode" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" autocomplete="off">
            </div>
            
            <button id="activateBtn" class="activate-btn">
                <span class="btn-text">🚀 تفعيل الاشتراك</span>
                <div class="loader"></div>
            </button>
            
            <div id="messageBox" class="message"></div>
            
            <a href="index.html" class="back-link">← العودة للنظام</a>
            
            <div class="contact-info">
                <p>تحتاج مساعدة؟ تواصل مع الدعم الفني</p>
                <a href="https://wa.me/20101116626962" target="_blank">واتساب الدعم</a>
            </div>
        </div>
    </div>
    
    <script>
        const SUBSCRIPTION_API = "https://abogad.vercel.app";
        const CLIENT_NAME = "abogad";
        
        // ==========================================
        // ✅ الحماية من جهة العميل
        // ==========================================
        (function() {
            document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) { e.preventDefault(); return false; }
                if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) { e.preventDefault(); return false; }
                if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) { e.preventDefault(); return false; }
                if (e.ctrlKey && (e.key === 'S' || e.key === 's' || e.keyCode === 83)) { e.preventDefault(); return false; }
            });
            
            setInterval(function() {
                if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) { console.clear(); }
            }, 1000);
        })();
        
        // ==========================================
        // ✅ فحص الاشتراك عند تحميل الصفحة
        // ==========================================
        async function checkSubscriptionOnLoad() {
            try {
                const response = await fetch(`${SUBSCRIPTION_API}/api/codes/check-subscription`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_name: CLIENT_NAME })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.active && data.remaining_days > 0) {
                        window.location.href = 'index.html';
                    }
                }
            } catch (error) {
                console.log("تعذر فحص الاشتراك");
            }
        }
        
        // ==========================================
        // ✅ تنسيق كود التفعيل تلقائياً
        // ==========================================
        const activationInput = document.getElementById('activationCode');
        
        activationInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-zA-Z0-9]/g, '');
            value = value.substring(0, 16);
            
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formatted += '-';
                formatted += value[i].toUpperCase();
            }
            
            this.value = formatted;
        });
        
        // ==========================================
        // ✅ تفعيل الاشتراك
        // ==========================================
        const activateBtn = document.getElementById('activateBtn');
        const messageBox = document.getElementById('messageBox');
        
        activateBtn.addEventListener('click', async function() {
            const code = activationInput.value.replace(/-/g, '');
            
            if (code.length < 16) {
                showMessage('⚠️ برجاء إدخال كود تفعيل صحيح (16 حرف)', 'error');
                activationInput.focus();
                return;
            }
            
            activateBtn.classList.add('loading');
            activateBtn.disabled = true;
            messageBox.style.display = 'none';
            
            try {
                const response = await fetch(`${SUBSCRIPTION_API}/api/codes/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, client_name: CLIENT_NAME })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('✅ تم تفعيل الاشتراك بنجاح! جاري توجيهك للنظام...', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                } else {
                    const errorMsg = data.message || '❌ كود التفعيل غير صحيح أو منتهي الصلاحية';
                    showMessage(errorMsg, 'error');
                }
            } catch (error) {
                showMessage('❌ فشل الاتصال بخادم التفعيل. حاول مرة أخرى.', 'error');
            } finally {
                activateBtn.classList.remove('loading');
                activateBtn.disabled = false;
            }
        });
        
        activationInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') activateBtn.click();
        });
        
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            messageBox.style.display = 'block';
        }
        
        // تشغيل فحص الاشتراك
        checkSubscriptionOnLoad();
    </script>
    
</body>
</html>
